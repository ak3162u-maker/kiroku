
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推しアプリ</title>
<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
}

.header {
  padding:12px;
  text-align:center;
  background:black;
}

/* フォルダ */
.folder {
  padding:10px;
}

.folder-title {
  font-weight:bold;
  margin:10px;
  cursor:pointer;
}

/* 2列 */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:#222;
  border-radius:12px;
  padding:6px;
  text-align:center;
}

.card img {
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
}

.hidden { display:none; }

.detail {
  padding:15px;
}

#dImg {
  width:100%;
  max-height:300px;
  object-fit:cover;
  border-radius:12px;
}

button,input,select {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
}

button { background:#333; color:white; }
</style>
</head>

<body>

<div class="header">推しアプリ</div>

<!-- 一覧 -->
<div id="list"></div>

<!-- 詳細 -->
<div id="detail" class="detail hidden">
  <button onclick="goBack()">←戻る</button>
  <h2 id="dName"></h2>
  <p id="dInfo"></p>
  <img id="dImg">
  <button onclick="editName()">名前変更</button>
  <button onclick="deleteOshi()">削除</button>
</div>

<!-- 追加 -->
<div class="detail">
  <input id="nameInput" placeholder="名前">
  <input id="folderInput" placeholder="フォルダ名">

  <select id="month"><option value="">月</option></select>
  <select id="day"><option value="">日</option></select>

  <input id="startInput" type="date">
  <input id="imgInput" type="file">

  <button onclick="addOshi()">追加</button>

  <button onclick="backup()">バックアップ</button>
  <input type="file" onchange="restore(this.files[0])">
</div>

<script>
let data = JSON.parse(localStorage.getItem("oshiData") || "[]");
let currentIndex = null;

/* 月日 */
for(let i=1;i<=12;i++) month.innerHTML+=`<option value="${i}">${i}月</option>`;
for(let i=1;i<=31;i++) day.innerHTML+=`<option value="${i}">${i}日</option>`;

function save(){
  localStorage.setItem("oshiData", JSON.stringify(data));
}

function calcDays(start){
  if(!start) return "未設定";
  return Math.floor((Date.now()-new Date(start))/86400000);
}

/* 描画（フォルダ分け） */
function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  const groups = {};

  data.forEach((o,i)=>{
    const f = o.folder || "未分類";
    if(!groups[f]) groups[f] = [];
    groups[f].push({ ...o, index:i });
  });

  for(let f in groups){
    const folderDiv = document.createElement("div");
    folderDiv.className = "folder";

    const title = document.createElement("div");
    title.className = "folder-title";
    title.textContent = "▼ " + f;

    const grid = document.createElement("div");
    grid.className = "grid";

    title.onclick = ()=>{
      grid.style.display = grid.style.display === "none" ? "grid" : "none";
    };

    groups[f].forEach(o=>{
      const card = document.createElement("div");
      card.className = "card";
      card.onclick = ()=>openDetail(o.index);

      card.innerHTML = `
        <img src="${o.img || ""}">
        <div>${o.name || "名無し"}</div>
      `;

      grid.appendChild(card);
    });

    folderDiv.appendChild(title);
    folderDiv.appendChild(grid);
    list.appendChild(folderDiv);
  }
}

/* 追加 */
function addOshi(){
  const name = nameInput.value;
  const folder = folderInput.value;
  const start = startInput.value;

  const m = month.value;
  const d = day.value;
  const birthday = (m && d) ? m + "/" + d : "";

  const file = imgInput.files[0];

  if(file){
    const r=new FileReader();
    r.onload=e=>{
      data.push({name,folder,start,birthday,img:e.target.result});
      save(); render();
    };
    r.readAsDataURL(file);
  }else{
    data.push({name,folder,start,birthday});
    save(); render();
  }
}

/* 詳細 */
function openDetail(i){
  currentIndex = i;
  const o = data[i];

  list.classList.add("hidden");
  detail.classList.remove("hidden");

  dName.textContent = o.name || "名無し";
  dInfo.textContent =
    "好きになって " + calcDays(o.start) + "日 / 誕生日: " + (o.birthday || "未設定");

  dImg.src = o.img || "";
}

/* 戻る */
function goBack(){
  list.classList.remove("hidden");
  detail.classList.add("hidden");
}

/* 削除 */
function deleteOshi(){
  data.splice(currentIndex,1);
  save(); goBack(); render();
}

/* 名前変更 */
function editName(){
  const n = prompt("新しい名前");
  if(n){
    data[currentIndex].name = n;
    save(); render(); openDetail(currentIndex);
  }
}

/* バックアップ */
function backup(){
  const blob = new Blob([JSON.stringify(data)]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "backup.json";
  a.click();
}

function restore(file){
  const r=new FileReader();
  r.onload=e=>{
    data = JSON.parse(e.target.result);
    save(); render();
  };
  r.readAsText(file);
}

setInterval(render,86400000);
render();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
