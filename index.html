<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推し記録</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;
}

.header {
  padding: 15px;
  text-align: center;
  background: #000;
}

.container {
  padding: 15px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #333;
  color: white;
}

/* フォルダ */
.folder {
  margin-top: 20px;
}

.folder-title {
  font-weight: bold;
  margin-bottom: 10px;
  cursor: pointer;
}

/* 2列表示 */
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #222;
  padding: 10px;
  border-radius: 12px;
  position: relative;
}

.delete {
  position: absolute;
  right: 5px;
  top: 5px;
  width: auto !important;
  padding: 4px 8px;
  background: #555;
  border-radius: 6px;
  font-size: 12px;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="header">推し記録</div>

<div class="container">
  <input id="name" placeholder="推しの名前">
  <input id="folder" placeholder="フォルダ名">

  <select id="birthMonth"><option value="">月</option></select>
  <select id="birthDay"><option value="">日</option></select>

  <input id="startDate" type="date">
  <input id="image" type="file" accept="image/*">

  <button onclick="addOshi()">追加</button>

  <div id="list"></div>
</div>

<script>

// 月日生成
for (let i = 1; i <= 12; i++) birthMonth.innerHTML += `<option>${i}</option>`;
for (let i = 1; i <= 31; i++) birthDay.innerHTML += `<option>${i}</option>`;

let data = JSON.parse(localStorage.getItem("oshiData")) || [];

function save() {
  localStorage.setItem("oshiData", JSON.stringify(data));
}

function calcDays(start) {
  if (!start) return "未設定";
  return Math.floor((new Date() - new Date(start)) / 86400000);
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const groups = {};

  data.forEach((item, index) => {
    const folder = item.folder || "未分類";
    if (!groups[folder]) groups[folder] = [];
    groups[folder].push({ ...item, index });
  });

  for (let folder in groups) {
    const section = document.createElement("div");
    section.className = "folder";

    const title = document.createElement("div");
    title.className = "folder-title";
    title.textContent = "▼ " + folder;

    const cards = document.createElement("div");
    cards.className = "cards";

    // 折りたたみ
    title.onclick = () => {
      cards.style.display = cards.style.display === "none" ? "grid" : "none";
    };

    groups[folder].forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.draggable = true;

      // ドラッグ
      card.ondragstart = (e) => {
        e.dataTransfer.setData("index", item.index);
      };

      card.ondragover = (e) => e.preventDefault();

      card.ondrop = (e) => {
        const from = e.dataTransfer.getData("index");
        const to = item.index;

        const temp = data[from];
        data.splice(from, 1);
        data.splice(to, 0, temp);

        save();
        render();
      };

      card.innerHTML = `
        <button class="delete" onclick="removeOshi(${item.index})">×</button>
        <strong>${item.name || "名前なし"}</strong><br>
        ${item.birthday || "誕生日未設定"}<br>
        ${calcDays(item.start)}日
        ${item.image ? `<img src="${item.image}">` : ""}
      `;

      cards.appendChild(card);
    });

    section.appendChild(title);
    section.appendChild(cards);
    list.appendChild(section);
  }
}

function addOshi() {
  const name = document.getElementById("name").value;
  const folder = document.getElementById("folder").value;
  const month = document.getElementById("birthMonth").value;
  const day = document.getElementById("birthDay").value;
  const birthday = (month && day) ? `${month}/${day}` : "";
  const start = document.getElementById("startDate").value;
  const file = document.getElementById("image").files[0];

  if (file) {
    const reader = new FileReader();
    reader.onload = e => {
      data.push({ name, folder, birthday, start, image: e.target.result });
      save();
      render();
    };
    reader.readAsDataURL(file);
  } else {
    data.push({ name, folder, birthday, start });
    save();
    render();
  }
}

function removeOshi(index) {
  data.splice(index, 1);
  save();
  render();
}

render();

</script>

</body>
</html>
