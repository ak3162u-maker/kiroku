
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推しアプリ</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
}

/* ヘッダー */
.header {
  padding: 12px;
  text-align: center;
  background: black;
}

/* グリッド一覧 */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.card {
  background: #222;
  border-radius: 12px;
  padding: 8px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.detail {
  padding: 20px;
}

.hidden {
  display: none;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: #333;
  color: white;
}
</style>
</head>

<body>

<div class="header">推しアプリ</div>

<!-- 一覧 -->
<div id="listPage" class="grid"></div>

<!-- 詳細 -->
<div id="detailPage" class="detail hidden">
  <button onclick="goBack()">← 戻る</button>
  <h2 id="dName"></h2>
  <p id="dDays"></p>
  <img id="dImg">
  <button onclick="deleteOshi()">削除</button>
</div>

<!-- 追加 -->
<div class="detail">
  <input id="name" placeholder="名前">
  <input id="start" type="date">
  <input id="img" type="file">
  <button onclick="add()">追加</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("oshi")) || [];
let current = null;

function save() {
  localStorage.setItem("oshi", JSON.stringify(data));
}

function days(d) {
  if (!d) return "未設定";
  return Math.floor((new Date() - new Date(d)) / 86400000);
}

function render() {
  const list = document.getElementById("listPage");
  list.innerHTML = "";

  data.forEach((o, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.onclick = () => openDetail(i);

    div.innerHTML = `
      <img src="${o.img || ""}">
      <div>${o.name || "名前なし"}</div>
    `;

    list.appendChild(div);
  });
}

function add() {
  const name = document.getElementById("name").value;
  const start = document.getElementById("start").value;
  const file = document.getElementById("img").files[0];

  if (file) {
    const reader = new FileReader();
    reader.onload = e => {
      data.push({ name, start, img: e.target.result });
      save();
      render();
    };
    reader.readAsDataURL(file);
  } else {
    data.push({ name, start });
    save();
    render();
  }
}

function openDetail(i) {
  current = i;
  const o = data[i];

  document.getElementById("listPage").classList.add("hidden");
  document.getElementById("detailPage").classList.remove("hidden");

  document.getElementById("dName").textContent = o.name;
  document.getElementById("dDays").textContent = "好きになって " + days(o.start) + "日";
  document.getElementById("dImg").src = o.img || "";
}

function goBack() {
  document.getElementById("listPage").classList.remove("hidden");
  document.getElementById("detailPage").classList.add("hidden");
}

function deleteOshi() {
  data.splice(current, 1);
  save();
  goBack();
  render();
}

/* 自動更新（1日ごと） */
setInterval(render, 86400000);

render();

/* PWA */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
